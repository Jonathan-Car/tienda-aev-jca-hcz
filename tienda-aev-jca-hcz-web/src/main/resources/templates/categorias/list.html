<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{partes :: cabecera_publica('Categorías')}"></head>

<style>
    body { background-color: #f8f9fa; }
    .table-container {
        background: white;
        border-radius: 15px;
        padding: 30px;
        margin-top: 50px;
    }
    .header-title {
        color: #2c3e50;
        font-weight: bold;
        border-left: 5px solid #0d6efd;
        padding-left: 15px;
    }
</style>

<body>
<div th:replace="~{partes :: menu_publico}"></div>

<div class="container">
    <div class="table-container shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="header-title">Nuestras Categorías</h1>
            <span class="badge bg-secondary"
                  th:text="${categorias != null ? #lists.size(categorias) : 0} + ' categorías encontradas'">
                0 categorías
            </span>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th scope="col" class="ps-4">Nombre de la Categoría</th>
                    <th scope="col" class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categorias}" th:if="${categorias != null}">
                    <td class="ps-4 fw-semibold text-dark">
                        <span th:text="${cat?.nombre}">Nombre</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/categorias/{id}(id=${cat?.id})}"
                           class="btn btn-primary btn-sm px-4 rounded-pill shadow-sm">
                            Ver Detalle
                        </a>
                    </td>
                </tr>
                <tr th:if="${categorias == null or #lists.isEmpty(categorias)}">
                    <td colspan="2" class="text-center py-4 text-muted">
                        No hay categorías disponibles en este momento.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 border-top pt-3">
            <a th:href="@{/}" class="btn btn-link text-decoration-none shadow-none">
                <span class="me-1">←</span> Volver al inicio
            </a>
        </div>
    </div>
</div>

<footer class="text-center text-muted mt-5 pb-4">
    <small>© 2026 LingTech Cloud - Listado de Categorías</small>
</footer>

<th:block th:replace="~{partes :: scripts}"></th:block>
</body>
</html>
