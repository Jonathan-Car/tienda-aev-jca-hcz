<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administración - Confirmar Eliminación de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Eliminar Producto del Catálogo</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-center fs-5">¿Está seguro de que desea eliminar el siguiente registro?</p>

                    <div class="list-group mb-4">
                        <div class="list-group-item bg-light">
                            <small class="text-muted d-block">Referencia (EAN):</small>
                            <span class="fw-bold" th:text="${producto.codigoProducto}"></span>
                        </div>
                        <div class="list-group-item">
                            <small class="text-muted d-block">Nombre del producto:</small>
                            <span class="fw-bold" th:text="${producto.nombre}"></span>
                        </div>
                        <div class="list-group-item">
                            <small class="text-muted d-block">Marca asociada:</small>
                            <span th:text="${producto.marca.nombre}"></span>
                        </div>
                    </div>

                    <form th:action="@{/admin/productos/{id}/borrar(id=${producto.id})}" method="post">
                        <div class="d-flex justify-content-center gap-3 mt-4">
                            <a th:href="@{/admin/productos}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-danger px-5">Eliminar definitivamente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
