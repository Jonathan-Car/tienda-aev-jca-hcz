<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="cabecera_comun(titulo_pagina)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${titulo_pagina} - Panel Admin|">LingTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --admin-blue: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-admin { background-color: var(--admin-blue); box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .card { border: none; border-radius: 10px; }
        .breadcrumb-admin { background: white; padding: 0.75rem 1.25rem; border-radius: 50px; border: 1px solid #dee2e6; }
    </style>
</head>

<body>

<nav th:fragment="menu_superior(seccion_activa)" class="navbar navbar-expand-lg navbar-dark navbar-admin mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/admin}">
            <i class="bi bi-cpu-fill me-2"></i>LingTech <small class="text-info">Admin</small>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${seccion_activa == 'productos' ? 'active fw-bold' : ''}"
                       th:href="@{/admin/productos}">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${seccion_activa == 'marcas' ? 'active fw-bold' : ''}"
                       th:href="@{/admin/marcas}">Marcas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${seccion_activa == 'categorias' ? 'active fw-bold' : ''}"
                       th:href="@{/admin/categorias}">Categorías</a>
                </li>
            </ul>
            <div class="navbar-nav">
                <a class="btn btn-outline-info btn-sm rounded-pill" th:href="@{/}">
                    <i class="bi bi-shop me-1"></i> Ver Tienda Pública
                </a>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="migas(nombre_seccion)" class="container">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb breadcrumb-admin shadow-sm">
            <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Panel Control</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${nombre_seccion ?: 'Sección'}">Sección</li>
        </ol>
    </nav>
</div>

<th:block th:fragment="scripts_comun">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
