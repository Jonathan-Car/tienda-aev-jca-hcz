<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/partes :: cabecera_comun('Admin - Listado de Categorías')}"></head>
<body class="bg-light">

<div th:replace="~{admin/partes :: menu_superior('Categorías')}"></div>

<div class="container">
    <div th:replace="~{admin/partes :: migas('Categorías')}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Categorías</h2>
        <a th:href="@{/admin/categorias/nueva}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nueva Categoría
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${categorias}">
                    <td th:text="${c.id}">1</td>

                    <td class="fw-bold">
                        <a th:href="@{/admin/categorias/{id}(id=${c.id})}"
                           th:text="${c.nombre}"
                           class="text-primary text-decoration-none"
                           title="Ver productos de esta categoría">
                            Nombre
                        </a>
                    </td>

                    <td th:text="${c.descripcion}">Descripción de la categoría</td>

                    <td class="text-center">
                        <a th:href="@{/admin/categorias/{id}/editar(id=${c.id})}"
                           class="btn btn-warning btn-sm"
                           aria-label="Editar Categoría">
                            <i class="bi bi-pencil"></i> Editar
                        </a>

                        <a th:href="@{/admin/categorias/{id}/borrar(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           aria-label="Borrar Categoría">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(categorias)}">
                    <td colspan="4" class="text-center py-4 text-muted">
                        No hay categorías registradas en el sistema.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{admin/partes :: scripts_comun}"></th:block>

</body>
</html>
