<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Listado de Marcas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin}">Marcas - LingTech</a>
    </div>
</nav>

<div class="container">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb bg-white shadow-sm p-3 rounded border">
            <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Inicio</a></li>
            <li class="breadcrumb-item active" aria-current="page">Marcas</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gestión de Marcas</h2>
        <a th:href="@{/admin/marcas/nueva}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nueva Marca
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${marcas}">
                    <td th:text="${m.id}">1</td>
                    <td th:text="${m.nombre}" class="fw-bold">Nombre</td>
                    <td class="text-center">
                        <a th:href="@{/admin/marcas/{id}/editar(id=${m.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <a th:href="@{/admin/marcas/{id}/borrar(id=${m.id})}" class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i> Borrar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
