<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Formulario Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8"> <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0" th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}">Formulario</h4>
            </div>
            <div class="card-body p-4">
                <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

                <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Código EAN-13</label>
                            <input type="text" th:field="*{codigoProducto}" class="form-control" placeholder="13 dígitos" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre del artículo" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Marca</label>
                        <select th:field="*{marca}" class="form-select" required>
                            <option value="">Seleccione una marca...</option>
                            <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nombre}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Categorías</label>
                        <div class="border rounded p-3 bg-white">
                            <div th:each="cat : ${categorias}" class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" th:field="*{categorias}" th:value="${cat.id}">
                                <label class="form-check-label" th:text="${cat.nombre}"></label>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Precio (€)</label>
                            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Descuento (%)</label>
                            <input type="number" th:field="*{descuento}" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">URL Imagen</label>
                        <input type="text" th:field="*{imagen}" class="form-control" placeholder="http://...">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Descripción detallada del producto..."></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>
        </div>
    </div>
</div>
</body>
</html>
