<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/partes :: cabecera_comun('Detalle de Marca')}"></head>

<body class="bg-light text-black">
<div th:replace="~{admin/partes :: menu_superior('Tienda Admin')}"></div>

<div class="container">
    <div th:replace="~{admin/partes :: migas('Detalle de Marca')}"></div>

    <div class="row align-items-center mb-4">
        <div class="col">
            <h1 class="display-5">
                Gestión de Marca: <span th:text="${marca.nombre}" class="text-info">Nombre</span>
            </h1>
            <p class="lead">Productos asociados</p>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/marcas}" class="btn btn-outline-light">
                <i class="bi bi-arrow-left"></i> Volver a la lista
            </a>
        </div>
    </div>

    <div class="card bg-secondary text-white shadow">
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th class="ps-4">EAN</th>
                    <th>Nombre del Producto</th>
                    <th class="text-end pe-4">Precio</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td class="ps-4" th:text="${p.codigoProducto}">000</td>
                    <td th:text="${p.nombre}" class="fw-bold">Producto</td>
                    <td class="text-end pe-4" th:text="${p.precio} + ' €'">0.00 €</td>
                </tr>
                <tr th:if="${#lists.isEmpty(productos)}">
                    <td colspan="3" class="text-center py-4 text-muted">
                        No hay productos para esta marca.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3 text-muted">
        <small>ID de la Marca: <span th:text="${marca.id}">0</span></small>
    </div>
</div>
</body>
</html>
