<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/partes :: cabecera_comun('Detalle de Categoría')}"></head>

<body class="bg-dark text-white">
<div th:replace="~{admin/partes :: menu_superior('Tienda Admin')}"></div>

<div class="container">
    <div th:replace="~{admin/partes :: migas('Detalle de Categoría')}"></div>

    <div class="row align-items-center mb-4">
        <div class="col">
            <h1 class="display-5">
                Categoría: <span th:text="${categoria.nombre}" class="text-info">Nombre</span>
            </h1>
            <p class="lead">Listado de productos en esta familia (Orden A-Z por Java)</p>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/categorias}" class="btn btn-outline-light">
                <i class="bi bi-arrow-left"></i> Volver a categorías
            </a>
        </div>
    </div>

    <div class="card bg-secondary text-white shadow">
        <div class="card-header bg-primary">
            <h5 class="mb-0">Productos asociados</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead>
                <tr>
                    <th class="ps-4">Código EAN</th>
                    <th>Nombre</th>
                    <th class="text-end pe-4">Precio</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productos}">
                    <td class="ps-4" th:text="${p.codigoProducto}">000</td>
                    <td th:text="${p.nombre}" class="fw-bold">Producto</td>
                    <td class="text-end pe-4" th:text="${p.precio} + ' €'">0.00 €</td>
                </tr>
                <tr th:if="${#lists.isEmpty(productos)}">
                    <td colspan="3" class="text-center py-4 text-muted">
                        No hay productos asignados a esta categoría.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3 text-muted">
        <small>ID de Categoría: <span th:text="${categoria.id}">0</span></small>
    </div>
</div>

<th:block th:replace="~{admin/partes :: scripts_comun}"></th:block>
</body>
</html>
