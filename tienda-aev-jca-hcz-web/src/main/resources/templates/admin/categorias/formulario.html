<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Formulario Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${categoria.id == null ? 'Nueva Categoría' : 'Editar Categoría'}">Formulario</h4>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

                    <form th:action="@{/admin/categorias/guardar}" th:object="${categoria}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Electrónica" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Breve descripción..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">URL Imagen</label>
                            <input type="text" th:field="*{imagen}" class="form-control" placeholder="http://...">
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/admin/categorias}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success px-4">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
