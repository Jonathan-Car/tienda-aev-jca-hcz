<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Borrado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="alert alert-warning border-danger shadow p-5">
                <h2 class="text-danger mb-4">¿Eliminar Categoría?</h2>
                <p class="fs-5">Está a punto de borrar la categoría:</p>
                <h3 class="mb-5" th:text="${categoria.nombre}">Nombre de la categoría</h3>

                <form th:action="@{/admin/categorias/{id}/borrar(id=${categoria.id})}" method="post">
                    <div class="d-flex justify-content-center gap-3">
                        <a th:href="@{/admin/categorias}" class="btn btn-outline-secondary px-4">Cancelar</a>
                        <button type="submit" class="btn btn-danger px-4">Sí, Borrar definitivamente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
