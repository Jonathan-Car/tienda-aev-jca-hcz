<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Categoría</title>
</head>
<body>
<h1 th:text="${categoria.nombre}">Nombre Categoría</h1>

<div>
    <p><strong>Descripción:</strong> <span th:text="${categoria.descripcion}">Descripción aquí</span></p>

    <div class="foto-categoria">
        <img th:if="${categoria.imagen != null and !categoria.imagen.isEmpty()}"
             th:src="@{/imagenes/categories/{img}(img=${categoria.imagen})}"
             th:alt="${categoria.nombre}"
             style="max-width: 300px;"/>

        <img th:unless="${categoria.imagen != null and !categoria.imagen.isEmpty()}"
             th:src="@{/imagenes/categories/no-disponible.png}"
             alt="Imagen no disponible"
             style="max-width: 300px; opacity: 0.6;"/>
    </div>
</div>

<br>
<a th:href="@{/categorias}">Volver al listado</a>
</body>
</html>
