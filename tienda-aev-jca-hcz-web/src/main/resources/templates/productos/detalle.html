<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{partes :: cabecera_publica('Catálogo')}"></head>

<style>
    body { background-color: #f8f9fa; }
    .product-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border: none;
        border-radius: 15px;
    }
    .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
    .precio-original {
        text-decoration: line-through;
        color: #dc3545;
        font-size: 0.9rem;
    }
    .precio-final {
        color: #198754;
        font-weight: bold;
        font-size: 1.25rem;
    }
    .description-truncate {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        height: 3rem;
    }
</style>

<body>
<div th:replace="~{partes :: menu_publico}"></div>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold">Catálogo LingTech</h1>
        <p class="text-muted">Explora nuestra selección de productos tecnológicos</p>
    </header>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="p : ${productos}">
            <div class="card h-100 product-card shadow-sm">
                <div class="bg-light p-4 text-center" style="border-radius: 15px 15px 0 0;">
                    <img th:if="${p.imagen != null and !p.imagen.isEmpty()}"
                         th:src="@{/imagenes/productos/{img}(img=${p.imagen})}"
                         class="img-fluid" style="max-height: 150px; object-fit: contain;"
                         th:alt="${p.nombre}">
                    <img th:unless="${p.imagen != null and !p.imagen.isEmpty()}"
                         th:src="@{/imagenes/productos/no-disponible.png}"
                         class="img-fluid opacity-25" style="max-height: 150px;">
                </div>

                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${p.nombre}">Producto</h5>

                    <p class="card-text text-muted small description-truncate"
                       th:text="${#strings.length(p.descripcion) > 80 ? #strings.substring(p.descripcion,0,80) + '...' : p.descripcion}">
                        Descripción del producto.
                    </p>

                    <div class="mt-3">
                        <div th:if="${p.descuento > 0}">
                            <span class="precio-original" th:text="${p.precioOriginal + '€'}">0€</span>
                            <span class="badge bg-danger ms-2" th:text="${'-' + p.descuento + '%'}">-0%</span>
                        </div>
                        <div class="precio-final" th:text="${p.precioFinal + '€'}">0€</div>
                    </div>
                </div>

                <div class="card-footer bg-transparent border-0 pb-4">
                    <a th:href="@{/productos/{id}/{nombre}(id=${p.id}, nombre=${p.nombre})}"
                       class="btn btn-dark w-100 rounded-pill">Ver Detalles</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(productos)}" class="alert alert-light text-center mt-5 border">
        No se han encontrado productos en el catálogo.
    </div>
</div>

<footer class="text-center py-4 text-muted">
    <small>© 2026 LingTech - Listado de Productos</small>
</footer>

<th:block th:replace="~{partes :: scripts}"></th:block>
</body>
</html>
