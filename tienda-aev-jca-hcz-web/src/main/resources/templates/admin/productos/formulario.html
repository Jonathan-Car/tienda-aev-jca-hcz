<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/partes :: cabecera_comun('Formulario de Producto')}"></head>
<body class="bg-light">
<div th:replace="~{admin/partes :: menu_superior('productos')}"></div>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Datos del Producto</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
                <input type="hidden" th:field="*{id}" />

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Código EAN</label>
                        <input type="text" th:field="*{codigoProducto}" class="form-control" required maxlength="13" />
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="3" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Precio (€)</label>
                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" required />
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Descuento (%)</label>
                        <input type="number" th:field="*{descuento}" class="form-control" required />
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Marca</label>
                        <select th:field="*{marca}" class="form-select" required>
                            <option value="">-- Selecciona --</option>
                            <option th:each="m : ${marcas}" th:value="${m.id}" th:text="${m.nombre}"></option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categorías (Puedes seleccionar varias)</label>
                    <select th:field="*{categorias}" class="form-select" multiple>
                        <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
                    </select>
                    <small class="text-muted">Mantén pulsado Ctrl (o Cmd) para elegir varias.</small>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Guardar Producto</button>
                    <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
