<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{partes :: cabecera_publica('Detalle de Categoría')}"></head>

<style>
    body { background-color: #f8f9fa; }
    .detail-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        border: none;
    }
    .img-container {
        background: #e9ecef;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 400px;
    }
    .img-fluid-custom {
        max-height: 450px;
        object-fit: contain;
        transition: transform 0.3s ease;
    }
    .img-fluid-custom:hover { transform: scale(1.05); }
    .badge-category {
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.8rem;
    }
    /* Estilos para los productos de la categoría */
    .product-item-card {
        transition: all 0.3s ease;
        border: none;
        border-radius: 12px;
    }
    .product-item-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important;
    }
</style>

<body>
<div th:replace="~{partes :: menu_publico}"></div>

<div class="container py-5">
    <div th:replace="~{partes :: migas_publicas(${pagina_actual}, ${ruta_padre}, ${nombre_padre})}">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Inicio</a></li>
            <li class="breadcrumb-item"><a th:href="@{/categorias}" class="text-decoration-none">Categorías</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${categoria.nombre}">Categoría</li>
        </ol>
    </div>

    <div class="card detail-card shadow-lg mb-5">
        <div class="row g-0">
            <div class="col-md-6 img-container">
                <img th:if="${categoria.imagen != null and !categoria.imagen.isEmpty()}"
                     th:src="@{/imagenes/categorias/{img}(img=${categoria.imagen})}"
                     th:alt="${categoria.nombre}"
                     class="img-fluid img-fluid-custom p-4"/>

                <div th:unless="${categoria.imagen != null and !categoria.imagen.isEmpty()}" class="text-center">
                    <img th:src="@{/imagenes/categorias/no-disponible.png}"
                         alt="Imagen no disponible"
                         class="img-fluid opacity-50"
                         style="max-width: 200px;"/>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card-body p-5">
                    <span class="badge bg-primary mb-3 badge-category">Catálogo Oficial</span>
                    <h1 class="display-5 fw-bold mb-4" th:text="${categoria.nombre}">Nombre Categoría</h1>

                    <div class="mb-4">
                        <h5 class="text-secondary fw-bold">Descripción</h5>
                        <p class="lead text-muted" th:text="${categoria.descripcion}">
                            Descripción de la categoría.
                        </p>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-start mt-5">
                        <a th:href="@{/categorias}" class="btn btn-outline-secondary btn-lg px-4 me-md-2">
                            <i class="bi bi-arrow-left"></i> Volver al listado
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5">
        <h3 class="fw-bold mb-4 border-bottom pb-2">Productos en esta categoría</h3>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" th:if="${not #lists.isEmpty(productos)}">
            <div class="col" th:each="p : ${productos}">
                <div class="card h-100 product-item-card shadow-sm">
                    <div class="p-3 text-center bg-light rounded-top">
                        <img th:if="${p.imagen != null and !p.imagen.isEmpty()}"
                             th:src="@{/imagenes/productos/{img}(img=${p.imagen})}"
                             class="img-fluid" style="max-height: 120px; object-fit: contain;">
                        <img th:unless="${p.imagen != null and !p.imagen.isEmpty()}"
                             th:src="@{/imagenes/productos/no-disponible.png}"
                             class="img-fluid opacity-25" style="max-height: 120px;">
                    </div>
                    <div class="card-body">
                        <h6 class="card-title fw-bold text-dark" th:text="${p.nombre}">Producto</h6>
                        <p class="card-text text-primary fw-bold" th:text="${p.precio + '€'}">0€</p>
                        <a th:href="@{/productos/{id}/{nombre}(id=${p.id}, nombre=${p.nombre})}"
                           class="btn btn-sm btn-outline-dark w-100">Ver detalles</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(productos)}" class="alert alert-light border text-center py-4">
            No hay productos asignados a esta categoría todavía.
        </div>
    </div>
</div>

<footer class="text-center text-muted mt-5 pb-4">
    <small>© 2026 LingTech Cloud - Vista de Detalle Optimizada</small>
</footer>

<th:block th:replace="~{partes :: scripts}"></th:block>
</body>
</html>
